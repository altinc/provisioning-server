events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Basic Settings
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Security Headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m rate=2r/s;

    # Cache configuration
    proxy_cache_path /var/cache/nginx/fw_cache 
        levels=1:2 
        keys_zone=fw_cache:10m 
        max_size=2g 
        inactive=30d
        use_temp_path=off;
    
    # Additional cache for device images and assets
    proxy_cache_path /var/cache/nginx/static_cache
        levels=1:2
        keys_zone=static_cache:5m
        max_size=500m
        inactive=7d
        use_temp_path=off;

    # Buffer sizes for large firmware files
    # Increase buffers to handle large responses in memory
    proxy_buffer_size 128k;        # For response headers
    proxy_buffers 16 256k;         # 16 buffers of 256k = 4MB total
    proxy_busy_buffers_size 512k;  # Amount that can be busy sending to client
    proxy_temp_file_write_size 1m; # Write to temp file in 1MB chunks
    
    # Alternative: disable buffering entirely for firmware files
    # This streams directly from upstream to client
    # proxy_buffering off; # Uncomment to disable buffering completely
    
    # Upstream backend
    upstream app_backend {
        server app:3000;
        keepalive 32;
    }

    # Cache key configuration
    proxy_cache_key "$scheme$request_method$host$request_uri";
    
    # HTTP server
    server {
        listen 80;
        server_name _;

        # Firmware files - aggressive caching
        location ~ ^/fw/.*\.(bin|rom|img|fw)$ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://app_backend;
            proxy_cache fw_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 301 302 1h;
            proxy_cache_valid 404 1h;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            
            # Specific buffering for large firmware files
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 32 256k;         # 8MB total buffer
            proxy_busy_buffers_size 1m;
            proxy_temp_file_write_size 2m;
            
            # Add cache status header for debugging
            add_header X-Cache-Status $upstream_cache_status always;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Timeouts for firmware downloads
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Device configuration files - moderate caching
        location ~ \.(xml|cfg|conf)$ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://app_backend;
            proxy_cache fw_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 301 302 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_bypass $http_cache_control;
            
            add_header X-Cache-Status $upstream_cache_status always;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Device images and assets - moderate caching
        location ~ ^/(devices|assets)/.*\.(png|jpg|jpeg|gif|ico|svg)$ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://app_backend;
            proxy_cache static_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 301 302 1h;
            proxy_cache_valid 404 1h;
            
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=604800";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Device images and assets - moderate caching
        location ~ ^/(devices|assets)/.*\.(png|jpg|jpeg|gif|ico|svg)$ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://app_backend;
            proxy_cache static_cache;
            proxy_cache_valid 200 7d;
            proxy_cache_valid 301 302 1h;
            proxy_cache_valid 404 1h;
            
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=604800";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Admin endpoints - no caching
        location /admin {
            limit_req zone=admin burst=5 nodelay;
            
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # All other endpoints
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Firmware files - aggressive caching (same as HTTP)
        location ~ ^/fw/.*\.(bin|rom|img|fw)$ {
            limit_req zone=api burst=50 nodelay;
            
            proxy_pass http://app_backend;
            proxy_cache fw_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 301 302 1h;
            proxy_cache_valid 404 1h;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            
            # Specific buffering for large firmware files
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 32 256k;         # 8MB total buffer
            proxy_busy_buffers_size 1m;
            proxy_temp_file_write_size 2m;
            
            add_header X-Cache-Status $upstream_cache_status always;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Device configuration files - moderate caching
        location ~ \.(xml|cfg|conf)$ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://app_backend;
            proxy_cache fw_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 301 302 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_bypass $http_cache_control;
            
            add_header X-Cache-Status $upstream_cache_status;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Admin endpoints - no caching
        location /admin {
            limit_req zone=admin burst=5 nodelay;
            
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # All other endpoints
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}