<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background-color: #fafafa;
      color: #333;
      line-height: 1.6;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }
    
    .success-container {
      padding: 60px 20px;
    }
    
    .success-icon {
      font-size: 100px;
      color: #28a745;
      margin-bottom: 20px;
    }
    
    .success-container h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    .footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 14px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    
    .footer a {
      color: inherit;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-container">
      <div class="success-icon">✅</div>
      <h1>Success!</h1>
    </div>
  </div>
  
  <footer class="footer">
    <p>Copyright © <a href="https://altinc.ca/">Alt Telecom</a> {{ currentYear }}.</p>
  </footer>
</body>
</html>
