<!-- shared-header.html - Include this in all templates -->
<div class="header">
    <h1>
        {% if page_icon %}
            <i class="{{ page_icon }}"></i>
        {% endif %}
        {{ page_title | default('VoIP Provisioning Admin') }}
    </h1>
    <p>{{ page_description | default('Administrative Dashboard') }}</p>
</div>

<nav class="nav">
    <ul class="nav-list">
        <li class="nav-item">
            <a href="/admin/dashboard" class="{% if current_page == 'dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i>
                Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a href="/admin/logs" class="{% if current_page == 'logs' %}active{% endif %}">
                <i class="fas fa-list-alt"></i>
                Logs
            </a>
        </li>
        <li class="nav-item">
            <a href="/admin/devices" class="{% if current_page == 'devices' %}active{% endif %}">
                <i class="fas fa-phone"></i>
                Devices
            </a>
        </li>
        <li class="nav-item">
            <a href="/admin/files/manager" class="{% if current_page == 'files' %}active{% endif %}">
                <i class="fas fa-folder-open"></i>
                Files
            </a>
        </li>
        <li class="nav-item">
            <a href="/admin/troubleshoot" class="{% if current_page == 'troubleshoot' %}active{% endif %}">
                <i class="fas fa-tools"></i>
                Troubleshoot
            </a>
        </li>
    </ul>
</nav>
